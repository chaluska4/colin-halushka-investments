<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DDFBFF"/>
      <stop offset="100%" stop-color="#63D8FF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="32" height="32" rx="6" ry="6" fill="#060d1a"/>

  <!-- Subtle cyan border -->
  <rect width="32" height="32" rx="6" ry="6" fill="none" stroke="rgba(99,216,255,0.35)" stroke-width="1"/>

  <!-- CH letters with glow -->
  <text
    x="16"
    y="21"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="13"
    font-weight="700"
    letter-spacing="-0.5"
    fill="url(#textGrad)"
    filter="url(#glow)"
  >CH</text>
</svg>
